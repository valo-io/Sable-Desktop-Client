name: Publish Artifact to Release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'ID of the workflow run that produced the artifacts'
        required: true
        type: number
      tag_name:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
      release_title:
        description: 'Release title'
        required: false
        type: string
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to create releases
      actions: read     # Needed to download artifacts

    steps:
      - name: Download all artifacts from workflow run
        uses: actions/download-artifact@v4
        with:
          pattern: '*'                     # Download every artifact from the run
          path: ./artifacts                # Each artifact goes into its own subfolder
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run_id }}

      - name: List downloaded files (debug)
        run: ls -laR ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.release_title || inputs.tag_name }}
          prerelease: ${{ inputs.prerelease }}
          files: ./artifacts/**/*          # Upload all files from all artifacts
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Multi‑Arch Windows + Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g., 1.17.0)'
        required: true
        default: '1.17.0'
        type: string
      app_id:
        description: 'Android application ID'
        required: true
        default: 'com.valo.sable'
        type: string
      build_windows_x64:
        description: 'Build Windows x64'
        required: false
        default: true
        type: boolean
      build_windows_arm64:
        description: 'Build Windows ARM64'
        required: false
        default: true
        type: boolean
      build_android_armv7:
        description: 'Build Android ARMv7 (32‑bit)'
        required: false
        default: true
        type: boolean
      build_android_armv8:
        description: 'Build Android ARMv8 (64‑bit)'
        required: false
        default: true
        type: boolean
      prerelease:
        description: 'Mark release as pre‑release?'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      # --- Setup Node, pnpm, Rust, Tauri CLI ---
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          override: true

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install dependencies
        run: pnpm install

      # --- Add Windows ARM64 Rust target if needed ---
      - name: Add Windows ARM64 Rust target
        if: inputs.build_windows_arm64 == true
        run: rustup target add aarch64-pc-windows-msvc

      # --- Prepare Android keystore (if any Android build selected) ---
      - name: Prepare Android keystore
        if: inputs.build_android_armv7 == true || inputs.build_android_armv8 == true
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if (-not $env:KEYSTORE_BASE64) {
            Write-Host "::error::Missing ANDROID_KEYSTORE_BASE64 secret"
            exit 1
          }
          $keystorePath = "$env:USERPROFILE\.android\debug.keystore"
          New-Item -ItemType Directory -Force -Path (Split-Path $keystorePath) | Out-Null
          [IO.File]::WriteAllBytes($keystorePath, [Convert]::FromBase64String($env:KEYSTORE_BASE64))
          echo "KEYSTORE_PATH=$keystorePath" >> $env:GITHUB_ENV
          echo "KEYSTORE_PASSWORD=$env:KEYSTORE_PASSWORD" >> $env:GITHUB_ENV
          echo "KEY_ALIAS=$env:KEY_ALIAS" >> $env:GITHUB_ENV
          echo "KEY_PASSWORD=$env:KEY_PASSWORD" >> $env:GITHUB_ENV

      # --- Configure Tauri for Android signing (if Android builds enabled) ---
      - name: Configure Android signing in tauri.conf.json
        if: inputs.build_android_armv7 == true || inputs.build_android_armv8 == true
        shell: pwsh
        run: |
          $conf = "src-tauri/tauri.conf.json"
          $json = Get-Content $conf -Raw | ConvertFrom-Json
      
          # Ensure the path tauri -> bundle -> android exists
          if ($null -eq $json.tauri) { $json | Add-Member -MemberType NoteProperty -Name 'tauri' -Value @{} }
          if ($null -eq $json.tauri.bundle) { $json.tauri | Add-Member -MemberType NoteProperty -Name 'bundle' -Value @{} }
          if ($null -eq $json.tauri.bundle.android) { $json.tauri.bundle | Add-Member -MemberType NoteProperty -Name 'android' -Value @{} }
      
          # Expand environment variables for the signing properties
          $keystorePath = $env:KEYSTORE_PATH
          $keystorePass = $env:KEYSTORE_PASSWORD
          $keyAlias = $env:KEY_ALIAS
          $keyPass = $env:KEY_PASSWORD
      
          # Build the signing object with actual values (not $env: references)
          $signing = @{
            keystorePath = $keystorePath
            keystorePassword = $keystorePass
            keyAlias = $keyAlias
            keyPassword = $keyPass
          }
      
          # Assign the signing config
          $json.tauri.bundle.android.signing = $signing
      
          # Write back the updated JSON
          $json | ConvertTo-Json -Depth 10 | Set-Content $conf
      
          Write-Host "✅ Android signing config added to tauri.conf.json"
          Write-Host "   Keystore path: $keystorePath"
          Write-Host "   Alias: $keyAlias"

      # --- Build Windows x64 ---
      - name: Build Windows x64
        if: inputs.build_windows_x64 == true
        id: build_win_x64
        continue-on-error: true
        run: pnpm tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Copy Windows x64 build to release folder
        if: steps.build_win_x64.outcome == 'success'
        run: |
          New-Item -ItemType Directory -Force -Path release_artifacts | Out-Null
          Copy-Item "src-tauri/target/release/bundle/msi/*.msi" release_artifacts/ -ErrorAction SilentlyContinue

      # --- Build Windows ARM64 ---
      - name: Build Windows ARM64
        if: inputs.build_windows_arm64 == true
        id: build_win_arm64
        continue-on-error: true
        run: pnpm tauri build --target aarch64-pc-windows-msvc
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Copy Windows ARM64 build to release folder
        if: steps.build_win_arm64.outcome == 'success'
        run: |
          New-Item -ItemType Directory -Force -Path release_artifacts | Out-Null
          Copy-Item "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi" release_artifacts/ -ErrorAction SilentlyContinue

      # --- Android: Setup SDK/NDK and initialise project with correct identifier ---
      - name: Setup Android SDK & NDK
        if: inputs.build_android_armv7 == true || inputs.build_android_armv8 == true
        uses: android-actions/setup-android@v3

      - name: Regenerate Android project with correct identifier and signing
        if: inputs.build_android_armv7 == true || inputs.build_android_armv8 == true
        shell: pwsh
        run: |
          # Update tauri.conf.json version and identifier
          $conf = "src-tauri/tauri.conf.json"
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          $json.version = "${{ inputs.version }}"
          $json.identifier = "${{ inputs.app_id }}"
          $json | ConvertTo-Json -Depth 10 | Set-Content $conf
          Write-Host "Set version=$($json.version), identifier=$($json.identifier)"

          # Delete old Android project
          if (Test-Path "src-tauri/gen/android") {
            Remove-Item -Recurse -Force "src-tauri/gen/android"
            Write-Host "Removed old gen/android"
          }

          # Re-initialise Android project (will pick up signing config from tauri.conf.json)
          pnpm tauri android init
          Write-Host "Android project re-initialized with signing config"

      # --- Build Android ARMv7 ---
      - name: Build Android ARMv7
        if: inputs.build_android_armv7 == true
        id: build_android_armv7
        continue-on-error: true
        shell: pwsh
        run: pnpm tauri android build --target armv7
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Copy Android ARMv7 APK to release folder
        if: steps.build_android_armv7.outcome == 'success'
        run: |
          New-Item -ItemType Directory -Force -Path release_artifacts | Out-Null
          Copy-Item "src-tauri/gen/android/app/build/outputs/apk/*/release/*.apk" release_artifacts/ -ErrorAction SilentlyContinue

      # --- Build Android ARMv8 ---
      - name: Build Android ARMv8
        if: inputs.build_android_armv8 == true
        id: build_android_armv8
        continue-on-error: true
        shell: pwsh
        run: pnpm tauri android build --target aarch64
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Copy Android ARMv8 APK to release folder
        if: steps.build_android_armv8.outcome == 'success'
        run: |
          New-Item -ItemType Directory -Force -Path release_artifacts | Out-Null
          Copy-Item "src-tauri/gen/android/app/build/outputs/apk/*/release/*.apk" release_artifacts/ -ErrorAction SilentlyContinue

      # --- Create GitHub Release with all successful artifacts ---
      - name: List collected artifacts
        run: |
          if (Test-Path release_artifacts) {
            Write-Host "Artifacts found:"
            Get-ChildItem release_artifacts
          } else {
            Write-Host "No artifacts were built."
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}-nightly-${{ github.run_number }}
          name: "Version ${{ inputs.version }} – Build ${{ github.run_number }}"
          prerelease: ${{ inputs.prerelease }}
          files: release_artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

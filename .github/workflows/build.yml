name: Build Multi‑Arch Windows + Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g., 1.17.0)'
        required: true
        default: '1.17.0'
        type: string
      app_id:
        description: 'Android application ID'
        required: true
        default: 'com.valo.sable'
        type: string
      build_windows_x64:
        description: 'Build Windows x64'
        required: false
        default: true
        type: boolean
      build_windows_arm64:
        description: 'Build Windows ARM64'
        required: false
        default: true
        type: boolean
      build_android_armv7:
        description: 'Build Android ARMv7 (32‑bit)'
        required: false
        default: true
        type: boolean
      build_android_armv8:
        description: 'Build Android ARMv8 (64‑bit)'
        required: false
        default: true
        type: boolean
      prerelease:
        description: 'Mark release as pre‑release?'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      # -------------------- Common tools --------------------
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          override: true

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install dependencies
        run: pnpm install

      - name: Add Windows ARM64 Rust target
        if: inputs.build_windows_arm64 == true
        run: rustup target add aarch64-pc-windows-msvc

      # -------------------- Windows x64 --------------------
      - name: Build Windows x64
        if: inputs.build_windows_x64 == true
        id: build_win_x64
        continue-on-error: true
        run: pnpm tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Copy Windows x64 build
        if: steps.build_win_x64.outcome == 'success'
        run: |
          New-Item -ItemType Directory -Force -Path release_artifacts | Out-Null
          Copy-Item "src-tauri/target/release/bundle/msi/*.msi" release_artifacts/ -ErrorAction SilentlyContinue

      # -------------------- Windows ARM64 --------------------
      - name: Build Windows ARM64
        if: inputs.build_windows_arm64 == true
        id: build_win_arm64
        continue-on-error: true
        run: pnpm tauri build --target aarch64-pc-windows-msvc
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Copy Windows ARM64 build
        if: steps.build_win_arm64.outcome == 'success'
        run: |
          New-Item -ItemType Directory -Force -Path release_artifacts | Out-Null
          Copy-Item "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi" release_artifacts/ -ErrorAction SilentlyContinue

      # -------------------- Android setup --------------------
      - name: Setup Android SDK & NDK
        if: inputs.build_android_armv7 == true || inputs.build_android_armv8 == true
        uses: android-actions/setup-android@v3

      - name: Regenerate Android project with correct identifier
        if: inputs.build_android_armv7 == true || inputs.build_android_armv8 == true
        shell: pwsh
        run: |
          $conf = "src-tauri/tauri.conf.json"
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          $json.version    = "${{ inputs.version }}"
          $json.identifier = "${{ inputs.app_id }}"
          $json | ConvertTo-Json -Depth 10 | Set-Content $conf
          Write-Host "Set version=$($json.version), identifier=$($json.identifier)"

          if (Test-Path "src-tauri/gen/android") {
            Remove-Item -Recurse -Force "src-tauri/gen/android"
          }
          pnpm tauri android init
          Write-Host "Android project initialized"

      # Signing setup MUST come after android init — init generates build.gradle.kts
      - name: Setup Android signing
        if: inputs.build_android_armv7 == true || inputs.build_android_armv8 == true
        shell: pwsh
        env:
          KEYSTORE_BASE64:   ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if (-not $env:KEYSTORE_BASE64) {
            Write-Error "Missing ANDROID_KEYSTORE_BASE64 secret"
            exit 1
          }

          # Decode keystore file — forward slashes are safe cross-platform in .properties
          $keystoreFile = "$env:RUNNER_TEMP\keystore.jks"
          [IO.File]::WriteAllBytes($keystoreFile, [Convert]::FromBase64String($env:KEYSTORE_BASE64))
          $keystorePath = $keystoreFile.Replace('\', '/')
          Write-Host "Keystore written to $keystorePath"

          # Write keystore.properties into the Android project root
          # rootProject.file("keystore.properties") resolves relative to src-tauri/gen/android/
          $props = @"
          keyAlias=$($env:KEY_ALIAS)
          password=$($env:KEY_PASSWORD)
          storeFile=$keystorePath
          storePassword=$($env:KEYSTORE_PASSWORD)
          "@
          Set-Content "src-tauri/gen/android/keystore.properties" $props
          Write-Host "keystore.properties written"

          # Patch build.gradle.kts — must add BOTH imports and use .getProperty() not [] casting
          $gradlePath = "src-tauri/gen/android/app/build.gradle.kts"
          $content = Get-Content $gradlePath -Raw

          # Add both required imports at the top if not already present
          if ($content -notmatch 'import java\.io\.FileInputStream') {
            $content = "import java.io.FileInputStream`n" + $content
          }
          if ($content -notmatch 'import java\.util\.Properties') {
            $content = "import java.util.Properties`n" + $content
          }

          # Insert signingConfigs block before buildTypes
          # Using .getProperty() avoids the "No cast needed" Kotlin DSL compile errors
          $signingBlock = @'

          signingConfigs {
              create("release") {
                  val keystorePropertiesFile = rootProject.file("keystore.properties")
                  val keystoreProperties = Properties()
                  if (keystorePropertiesFile.exists()) {
                      keystoreProperties.load(FileInputStream(keystorePropertiesFile))
                  }
                  keyAlias      = keystoreProperties.getProperty("keyAlias")
                  keyPassword   = keystoreProperties.getProperty("password")
                  storeFile     = file(keystoreProperties.getProperty("storeFile"))
                  storePassword = keystoreProperties.getProperty("storePassword")
              }
          }

          '@

          if ($content -notmatch 'signingConfigs') {
            $content = $content -replace '(\s*buildTypes\s*\{)', "$signingBlock`$1"
          }

          # Wire signingConfig into the release buildType
          if ($content -notmatch 'signingConfig\s*=\s*signingConfigs') {
            $content = $content -replace '(getByName\("release"\)\s*\{)', "`$1`n            signingConfig = signingConfigs.getByName(`"release`")"
          }

          Set-Content $gradlePath $content
          Write-Host "build.gradle.kts patched"

          # Print result for debugging
          Write-Host "--- build.gradle.kts ---"
          Get-Content $gradlePath

      # -------------------- Android ARMv7 --------------------
      - name: Build Android ARMv7
        if: inputs.build_android_armv7 == true
        id: build_android_armv7
        continue-on-error: true
        shell: pwsh
        run: pnpm tauri android build --target armv7

      - name: Copy Android ARMv7 APK
        if: steps.build_android_armv7.outcome == 'success'
        run: |
          New-Item -ItemType Directory -Force -Path release_artifacts | Out-Null
          Copy-Item "src-tauri/gen/android/app/build/outputs/apk/*/release/*.apk" release_artifacts/ -ErrorAction SilentlyContinue

      # -------------------- Android ARMv8 --------------------
      - name: Build Android ARMv8
        if: inputs.build_android_armv8 == true
        id: build_android_armv8
        continue-on-error: true
        shell: pwsh
        run: pnpm tauri android build --target aarch64

      - name: Copy Android ARMv8 APK
        if: steps.build_android_armv8.outcome == 'success'
        run: |
          New-Item -ItemType Directory -Force -Path release_artifacts | Out-Null
          Copy-Item "src-tauri/gen/android/app/build/outputs/apk/*/release/*.apk" release_artifacts/ -ErrorAction SilentlyContinue

      # -------------------- Release --------------------
      - name: List collected artifacts
        run: |
          if (Test-Path release_artifacts) {
            Write-Host "Artifacts found:"
            Get-ChildItem release_artifacts
          } else {
            Write-Host "No artifacts were built."
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}-nightly-${{ github.run_number }}
          name: "Version ${{ inputs.version }} – Build ${{ github.run_number }}"
          prerelease: ${{ inputs.prerelease }}
          files: release_artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

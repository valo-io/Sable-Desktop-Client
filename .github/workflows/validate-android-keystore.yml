name: Validate Android Keystore Secrets

on:
  workflow_dispatch:
    inputs: {}
  # Also can be triggered manually to test secrets

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (optional, but harmless)
        uses: actions/checkout@v4

      - name: Setup Java (needed for keytool)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode and test keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e  # exit on error

          # 1. Check if secrets exist
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "::error::ANDROID_KEYSTORE_PASSWORD secret is missing"
            exit 1
          fi
          if [ -z "$KEY_ALIAS" ]; then
            echo "::error::ANDROID_KEY_ALIAS secret is missing"
            exit 1
          fi
          if [ -z "$KEY_PASSWORD" ]; then
            echo "::error::ANDROID_KEY_PASSWORD secret is missing"
            exit 1
          fi

          # 2. Write keystore file from base64
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          if [ ! -s keystore.jks ]; then
            echo "::error::Failed to decode base64 or keystore is empty"
            exit 1
          fi
          echo "✅ Keystore decoded successfully."

          # 3. Test keystore password only (list aliases)
          if keytool -list -keystore keystore.jks -storepass "$KEYSTORE_PASSWORD" > /dev/null 2>&1; then
            echo "✅ Keystore password is correct."
          else
            echo "::error::Keystore password is incorrect or keystore is corrupted."
            exit 1
          fi

          # 4. Check if alias exists
          if keytool -list -keystore keystore.jks -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" > /dev/null 2>&1; then
            echo "✅ Alias '$KEY_ALIAS' exists in keystore."
          else
            echo "::error::Alias '$KEY_ALIAS' not found in keystore. Available aliases:"
            keytool -list -keystore keystore.jks -storepass "$KEYSTORE_PASSWORD" | grep -i "alias"
            exit 1
          fi

          # 5. Test key password (may be same as keystore password)
          if keytool -list -keystore keystore.jks -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" -keypass "$KEY_PASSWORD" > /dev/null 2>&1; then
            echo "✅ Key password is correct (matches alias)."
          else
            echo "::error::Key password is incorrect for alias '$KEY_ALIAS'."
            echo "If you used the same password for both, ensure KEY_PASSWORD matches KEYSTORE_PASSWORD."
            exit 1
          fi

          echo "🎉 All checks passed! Your Android keystore secrets are valid."

      - name: Final success message
        if: success()
        run: echo "✅ Validation complete – you can safely use these secrets in the main build workflow."
